name: Build PHP Base Image

on:
  push:
    branches: [main]
    paths:
      - docker/php/**
  workflow_dispatch:
    inputs:
      php_version:
        description: PHP version to build
        default: '8.4'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        php: ${{ github.event_name == 'workflow_dispatch' && fromJson(format('["{0}"]', inputs.php_version)) || fromJson('["8.4"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::115900265633:role/github-actions-preview
          aws-region: eu-west-2

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names reckless/php 2>/dev/null \
            || aws ecr create-repository --repository-name reckless/php \
               --image-scanning-configuration scanOnPush=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/php
          platforms: linux/arm64
          push: true
          tags: |
            115900265633.dkr.ecr.eu-west-2.amazonaws.com/reckless/php:${{ matrix.php }}
            115900265633.dkr.ecr.eu-west-2.amazonaws.com/reckless/php:${{ matrix.php }}-${{ github.sha }}
          build-args: |
            PHP_VERSION=${{ matrix.php }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
