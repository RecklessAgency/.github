name: Preview Deploy

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
        description: "laravel or wordpress"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC
      pull-requests: write  # PR comments

    steps:
      # ── Context ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "php=$(jq -r .php .claude/project.json)" >> $GITHUB_OUTPUT
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Derive names
        id: slug
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ steps.cfg.outputs.region }}"
          REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
          REPO_NAME="preview/${{ github.event.repository.name }}"

          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)

          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "service=preview-$SLUG" >> $GITHUB_OUTPUT
          echo "db=preview_$(echo $SLUG | tr '-' '_')" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "image=$REGISTRY/$REPO_NAME:$SLUG-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "image_latest=$REGISTRY/$REPO_NAME:$SLUG-latest" >> $GITHUB_OUTPUT

      # ── Build & Push to ECR ──────────────────────────────────
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ steps.slug.outputs.repo }}" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "${{ steps.slug.outputs.repo }}" \
            --image-scanning-configuration scanOnPush=false

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.slug.outputs.image }}
            ${{ steps.slug.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ steps.cfg.outputs.php }}

      # ── Database ─────────────────────────────────────────────
      - name: Create preview database
        run: |
          # Connect directly to the RDS instance via mysql client
          mysql -h "${{ secrets.DB_HOST }}" \
            -u "${{ secrets.DB_USERNAME }}" \
            -p"${{ secrets.DB_PASSWORD }}" \
            -e "CREATE DATABASE IF NOT EXISTS \`${{ steps.slug.outputs.db }}\`"

      # ── App Runner ───────────────────────────────────────────
      - name: Check if service exists
        id: svc
        run: |
          ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ steps.slug.outputs.service }}'].ServiceArn" \
            --output text 2>/dev/null || true)
          echo "arn=$ARN" >> $GITHUB_OUTPUT
          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App Runner service
        if: steps.svc.outputs.exists == 'false'
        id: create
        run: |
          ARN=$(aws apprunner create-service \
            --service-name "${{ steps.slug.outputs.service }}" \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ secrets.APPRUNNER_ECR_ROLE_ARN }}\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ steps.slug.outputs.image }}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"80\",
                  \"RuntimeEnvironmentVariables\": {
                    \"APP_ENV\": \"preview\",
                    \"APP_KEY\": \"${{ secrets.APP_KEY }}\",
                    \"APP_URL\": \"https://${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}\",
                    \"DB_HOST\": \"${{ secrets.DB_HOST }}\",
                    \"DB_PORT\": \"3306\",
                    \"DB_DATABASE\": \"${{ steps.slug.outputs.db }}\",
                    \"DB_USERNAME\": \"${{ secrets.DB_USERNAME }}\",
                    \"DB_PASSWORD\": \"${{ secrets.DB_PASSWORD }}\"
                  }
                }
              }
            }" \
            --instance-configuration "{
              \"Cpu\": \"0.25 vCPU\",
              \"Memory\": \"1 GB\",
              \"InstanceRoleArn\": \"${{ secrets.APPRUNNER_INSTANCE_ROLE_ARN }}\"
            }" \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/up",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 3
            }' \
            --query 'Service.ServiceArn' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Update existing App Runner service
        if: steps.svc.outputs.exists == 'true'
        run: |
          aws apprunner update-service \
            --service-arn "${{ steps.svc.outputs.arn }}" \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ secrets.APPRUNNER_ECR_ROLE_ARN }}\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ steps.slug.outputs.image }}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"80\",
                  \"RuntimeEnvironmentVariables\": {
                    \"APP_ENV\": \"preview\",
                    \"APP_KEY\": \"${{ secrets.APP_KEY }}\",
                    \"APP_URL\": \"https://${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}\",
                    \"DB_HOST\": \"${{ secrets.DB_HOST }}\",
                    \"DB_PORT\": \"3306\",
                    \"DB_DATABASE\": \"${{ steps.slug.outputs.db }}\",
                    \"DB_USERNAME\": \"${{ secrets.DB_USERNAME }}\",
                    \"DB_PASSWORD\": \"${{ secrets.DB_PASSWORD }}\"
                  }
                }
              }
            }"

      - name: Wait for service to be running
        id: wait
        run: |
          SERVICE_ARN="${{ steps.create.outputs.arn || steps.svc.outputs.arn }}"
          echo "Waiting for $SERVICE_ARN to be RUNNING..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' \
              --output text)
            echo "  Status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "RUNNING" ]; then
              URL=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query 'Service.ServiceUrl' \
                --output text)
              echo "service_url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Service failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      # ── DNS ──────────────────────────────────────────────────
      - name: Update Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          SUBDOMAIN="${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}"
          SERVICE_URL="${{ steps.wait.outputs.service_url }}"

          # Check if record exists
          RECORD_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$SUBDOMAIN&type=CNAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"$SUBDOMAIN\",
                \"content\": \"$SERVICE_URL\",
                \"proxied\": true
              }"
          else
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"$SUBDOMAIN\",
                \"content\": \"$SERVICE_URL\",
                \"proxied\": true
              }"
          fi

      # ── Summary ──────────────────────────────────────────────
      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const domain = '${{ steps.cfg.outputs.domain }}';
            const url = `https://${slug}.${domain}`;
            const body = [
              '## Preview Environment',
              '',
              `**${url}**`,
              '',
              `Branch: \`${process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME}\``,
              `Database: \`${{ steps.slug.outputs.db }}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('## Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.summary.addRaw(body).write();
