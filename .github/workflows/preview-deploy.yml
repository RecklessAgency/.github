name: Preview Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC
      pull-requests: write  # PR comments

    steps:
      # ── Context ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "php=$(jq -r .php .claude/project.json)" >> $GITHUB_OUTPUT
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "project_slug=$(jq -r .preview.slug .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$(jq -r .preview.aws.role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "execution_role_arn=$(jq -r .preview.aws.execution_role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "infrastructure_role_arn=$(jq -r .preview.aws.infrastructure_role_arn .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.aws_role_arn }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Derive names
        id: slug
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ steps.cfg.outputs.region }}"
          REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
          REPO_NAME="preview/${{ github.event.repository.name }}"

          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)

          PROJECT_SLUG="${{ steps.cfg.outputs.project_slug }}"
          KV_KEY="${BRANCH_SLUG}--${PROJECT_SLUG}"

          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "kv_key=$KV_KEY" >> $GITHUB_OUTPUT
          echo "preview_url=https://${KV_KEY}.${{ steps.cfg.outputs.domain }}" >> $GITHUB_OUTPUT
          echo "service=preview-$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "image=$REGISTRY/$REPO_NAME:$BRANCH_SLUG-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "image_latest=$REGISTRY/$REPO_NAME:$BRANCH_SLUG-latest" >> $GITHUB_OUTPUT

      # ── Build & Push to ECR ──────────────────────────────────
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ steps.slug.outputs.repo }}" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "${{ steps.slug.outputs.repo }}" \
            --image-scanning-configuration scanOnPush=false

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.slug.outputs.image }}
            ${{ steps.slug.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ steps.cfg.outputs.php }}

      # ── ECS Express ──────────────────────────────────────────
      - name: Check if service exists
        id: svc
        run: |
          ARN=$(aws ecs list-express-gateway-services \
            --query "expressGatewayServiceArns[?contains(@, '${{ steps.slug.outputs.service }}')]" \
            --output text 2>/dev/null || true)
          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "arn=$ARN" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ECS Express service
        if: steps.svc.outputs.exists == 'false'
        id: create
        run: |
          ARN=$(aws ecs create-express-gateway-service \
            --service-name "${{ steps.slug.outputs.service }}" \
            --execution-role-arn "${{ steps.cfg.outputs.execution_role_arn }}" \
            --infrastructure-role-arn "${{ steps.cfg.outputs.infrastructure_role_arn }}" \
            --primary-container "{
              \"image\": \"${{ steps.slug.outputs.image }}\",
              \"containerPort\": 80,
              \"environment\": [
                {\"name\": \"APP_ENV\", \"value\": \"preview\"},
                {\"name\": \"APP_KEY\", \"value\": \"${{ secrets.PREVIEWS_APP_KEY }}\"},
                {\"name\": \"APP_URL\", \"value\": \"${{ steps.slug.outputs.preview_url }}\"}
              ]
            }" \
            --region "${{ steps.cfg.outputs.region }}" \
            --query 'expressGatewayService.expressGatewayServiceArn' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Update ECS Express service
        if: steps.svc.outputs.exists == 'true'
        run: |
          aws ecs update-express-gateway-service \
            --express-gateway-service-arn "${{ steps.svc.outputs.arn }}" \
            --primary-container "{
              \"image\": \"${{ steps.slug.outputs.image }}\",
              \"containerPort\": 80,
              \"environment\": [
                {\"name\": \"APP_ENV\", \"value\": \"preview\"},
                {\"name\": \"APP_KEY\", \"value\": \"${{ secrets.PREVIEWS_APP_KEY }}\"},
                {\"name\": \"APP_URL\", \"value\": \"${{ steps.slug.outputs.preview_url }}\"}
              ]
            }" \
            --region "${{ steps.cfg.outputs.region }}"

      - name: Wait for service to be running
        id: wait
        run: |
          SERVICE_ARN="${{ steps.create.outputs.arn || steps.svc.outputs.arn }}"
          echo "Waiting for $SERVICE_ARN to be RUNNING..."
          for i in $(seq 1 60); do
            STATUS=$(aws ecs describe-express-gateway-service \
              --express-gateway-service-arn "$SERVICE_ARN" \
              --region "${{ steps.cfg.outputs.region }}" \
              --query 'expressGatewayService.status' \
              --output text)
            echo "  Status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "RUNNING" ]; then
              SERVICE_URL=$(aws ecs describe-express-gateway-service \
                --express-gateway-service-arn "$SERVICE_ARN" \
                --region "${{ steps.cfg.outputs.region }}" \
                --query 'expressGatewayService.serviceUrl' \
                --output text)
              echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Service failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      # ── Cloudflare KV ─────────────────────────────────────────
      - name: Register preview in Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.PREVIEWS_CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/96100875197cbb8ace4524aaf242af17/storage/kv/namespaces/1bb0fc32aa594b6497860018ef198dbd/values/${{ steps.slug.outputs.kv_key }}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "https://${{ steps.wait.outputs.service_url }}"

      # ── Summary ──────────────────────────────────────────────
      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.slug.outputs.preview_url }}';
            const body = [
              '## Preview Environment',
              '',
              `**[${url}](${url})**`,
              '',
              `Branch: \`${process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('## Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.summary.addRaw(body).write();
