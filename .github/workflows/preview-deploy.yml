name: Preview Deploy

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
        description: "laravel or wordpress"

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # OIDC

    steps:
      # ── Context ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "php=$(jq -r .php .claude/project.json)" >> $GITHUB_OUTPUT
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Derive branch slug
        id: slug
        run: |
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "service=preview-$SLUG" >> $GITHUB_OUTPUT
          echo "db=preview_$(echo $SLUG | tr '-' '_')" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ github.repository }}:$SLUG-${{ github.sha }}" >> $GITHUB_OUTPUT

      # ── Build & Push ─────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.slug.outputs.image }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.slug.outputs.slug }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ steps.cfg.outputs.php }}

      # ── AWS Auth ─────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.cfg.outputs.region }}

      # ── Database ─────────────────────────────────────────────
      - name: Create preview database
        run: |
          aws rds-data execute-statement \
            --resource-arn "${{ secrets.DB_CLUSTER_ARN }}" \
            --secret-arn "${{ secrets.DB_SECRET_ARN }}" \
            --sql "CREATE DATABASE IF NOT EXISTS \`${{ steps.slug.outputs.db }}\`"

      # ── App Runner ───────────────────────────────────────────
      - name: Check if service exists
        id: svc
        run: |
          ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ steps.slug.outputs.service }}'].ServiceArn" \
            --output text 2>/dev/null || true)
          echo "arn=$ARN" >> $GITHUB_OUTPUT
          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App Runner service
        if: steps.svc.outputs.exists == 'false'
        id: create
        run: |
          ARN=$(aws apprunner create-service \
            --service-name "${{ steps.slug.outputs.service }}" \
            --source-configuration '{
              "AuthenticationConfiguration": {
                "AccessRoleArn": "${{ secrets.APPRUNNER_ECR_ROLE_ARN }}"
              },
              "AutoDeploymentsEnabled": false,
              "ImageRepository": {
                "ImageIdentifier": "${{ steps.slug.outputs.image }}",
                "ImageRepositoryType": "ECR_PUBLIC",
                "ImageConfiguration": {
                  "Port": "80",
                  "RuntimeEnvironmentVariables": {
                    "APP_ENV": "preview",
                    "APP_KEY": "${{ secrets.APP_KEY }}",
                    "APP_URL": "https://${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}",
                    "DB_HOST": "${{ secrets.DB_HOST }}",
                    "DB_PORT": "3306",
                    "DB_DATABASE": "${{ steps.slug.outputs.db }}",
                    "DB_USERNAME": "${{ secrets.DB_USERNAME }}",
                    "DB_PASSWORD": "${{ secrets.DB_PASSWORD }}"
                  }
                }
              }
            }' \
            --instance-configuration '{
              "Cpu": "0.25 vCPU",
              "Memory": "1 GB",
              "InstanceRoleArn": "${{ secrets.APPRUNNER_INSTANCE_ROLE_ARN }}"
            }' \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/up",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 3
            }' \
            --query 'Service.ServiceArn' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Update existing App Runner service
        if: steps.svc.outputs.exists == 'true'
        run: |
          aws apprunner update-service \
            --service-arn "${{ steps.svc.outputs.arn }}" \
            --source-configuration '{
              "AuthenticationConfiguration": {
                "AccessRoleArn": "${{ secrets.APPRUNNER_ECR_ROLE_ARN }}"
              },
              "AutoDeploymentsEnabled": false,
              "ImageRepository": {
                "ImageIdentifier": "${{ steps.slug.outputs.image }}",
                "ImageRepositoryType": "ECR_PUBLIC",
                "ImageConfiguration": {
                  "Port": "80",
                  "RuntimeEnvironmentVariables": {
                    "APP_ENV": "preview",
                    "APP_KEY": "${{ secrets.APP_KEY }}",
                    "APP_URL": "https://${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}",
                    "DB_HOST": "${{ secrets.DB_HOST }}",
                    "DB_PORT": "3306",
                    "DB_DATABASE": "${{ steps.slug.outputs.db }}",
                    "DB_USERNAME": "${{ secrets.DB_USERNAME }}",
                    "DB_PASSWORD": "${{ secrets.DB_PASSWORD }}"
                  }
                }
              }
            }'

      - name: Wait for service to be running
        run: |
          SERVICE_ARN="${{ steps.create.outputs.arn || steps.svc.outputs.arn }}"
          echo "Waiting for $SERVICE_ARN to be RUNNING..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' \
              --output text)
            echo "  Status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "RUNNING" ]; then
              URL=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query 'Service.ServiceUrl' \
                --output text)
              echo "url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 10
          done

      # ── Migrations ───────────────────────────────────────────
      - name: Run migrations (Laravel)
        if: inputs.stack == 'laravel'
        run: |
          SERVICE_ARN="${{ steps.create.outputs.arn || steps.svc.outputs.arn }}"
          # Migrations run inside the container on first request to /up
          # or we can trigger via a one-off curl to an artisan endpoint
          # For now, rely on the health check hitting /up which triggers migration check
          echo "Service deployed — migrations will run on first request"

      # ── DNS ──────────────────────────────────────────────────
      - name: Update Cloudflare DNS
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          SUBDOMAIN="${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}"
          SERVICE_URL=$(aws apprunner describe-service \
            --service-arn "${{ steps.create.outputs.arn || steps.svc.outputs.arn }}" \
            --query 'Service.ServiceUrl' \
            --output text)

          # Check if record exists
          RECORD_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$SUBDOMAIN&type=CNAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            # Update existing record
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"$SUBDOMAIN\",
                \"content\": \"$SERVICE_URL\",
                \"proxied\": true
              }"
          else
            # Create new record
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"$SUBDOMAIN\",
                \"content\": \"$SERVICE_URL\",
                \"proxied\": true
              }"
          fi

      # ── Summary ──────────────────────────────────────────────
      - name: Post preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.slug }}';
            const domain = '${{ steps.cfg.outputs.domain }}';
            const url = `https://${slug}.${domain}`;
            const body = `## Preview Environment\n\n🔗 **${url}**\n\nBranch: \`${process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME}\`\nImage: \`${{ steps.slug.outputs.image }}\`\nDatabase: \`${{ steps.slug.outputs.db }}\``;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue?.number || 0,
            }).catch(() => ({ data: [] }));

            const existing = comments.find(c => c.body?.includes('## Preview Environment'));

            if (context.issue?.number) {
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            }

            core.summary.addRaw(body).write();
