name: Preview Deploy
# Architecture: Fargate run-task + Cloudflare Worker reverse proxy
#
# Each preview environment is a Fargate task running in a public subnet with a
# public IP. There is no ALB or load balancer — traffic flows:
#
#   Visitor (HTTPS) → Cloudflare Edge → Cloudflare Worker → Fargate task (HTTP, public IP)
#
# Cloudflare handles TLS termination. The Worker→container leg is plain HTTP over
# the public internet. This is acceptable for preview environments (ephemeral,
# non-production data). If sensitive data handling is required, consider routing
# through a Cloudflare Tunnel instead (requires NAT gateway for private subnets).
#
# Routing: the Worker looks up the KV key `{branch-slug}--{project-slug}` and
# proxies to the stored value `http://{public-ip}`. The KV entry is written here
# after the container passes a health check on /up, and removed by preview-teardown.yml.
#
# Container startup: the generic `reckless/php:{version}` ECR image clones the
# repo at startup using an SSH deploy key (base64-encoded in DEPLOY_KEY env var),
# runs composer/npm, migrates, and serves via `php artisan serve`.

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC
      pull-requests: write  # PR comments

    steps:
      # ── Context ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "php=$(jq -r .php .claude/project.json)" >> $GITHUB_OUTPUT
          echo "stack=$(jq -r .stack .claude/project.json)" >> $GITHUB_OUTPUT
          echo "build=$(jq -r '.preview.build // "generic"' .claude/project.json)" >> $GITHUB_OUTPUT
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "project_slug=$(jq -r .preview.slug .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$(jq -r .preview.aws.role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "execution_role_arn=$(jq -r .preview.aws.execution_role_arn .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.aws_role_arn }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Derive names
        id: slug
        run: |
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)

          PROJECT_SLUG="${{ steps.cfg.outputs.project_slug }}"
          KV_KEY="${BRANCH_SLUG}--${PROJECT_SLUG}"

          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "kv_key=$KV_KEY" >> $GITHUB_OUTPUT
          echo "task_family=preview-${BRANCH_SLUG}" >> $GITHUB_OUTPUT

      # ── Build image (dockerfile projects only) ───────────────
      - name: Log in to ECR
        if: steps.cfg.outputs.build == 'dockerfile'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Derive image name
        if: steps.cfg.outputs.build == 'dockerfile'
        id: image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ steps.cfg.outputs.region }}.amazonaws.com"
          REPO="preview/${{ github.event.repository.name }}"
          aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null \
            || aws ecr create-repository --repository-name "$REPO" --image-scanning-configuration scanOnPush=false
          IMAGE="$REGISTRY/$REPO:${{ steps.slug.outputs.branch_slug }}-${GITHUB_SHA::8}"
          echo "uri=$IMAGE" >> $GITHUB_OUTPUT
          if aws ecr describe-images --repository-name "$REPO" \
            --image-ids imageTag="${{ steps.slug.outputs.branch_slug }}-${GITHUB_SHA::8}" \
            2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.cfg.outputs.build == 'dockerfile' && steps.image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.cfg.outputs.build == 'dockerfile' && steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ steps.cfg.outputs.php }}

      # ── Resolve image URI ─────────────────────────────────────
      - name: Resolve image URI
        id: resolved
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT_ID.dkr.ecr.${{ steps.cfg.outputs.region }}.amazonaws.com"
          if [ "${{ steps.cfg.outputs.build }}" = "dockerfile" ]; then
            echo "image=${{ steps.image.outputs.uri }}" >> $GITHUB_OUTPUT
          else
            echo "image=${REGISTRY}/reckless/php:${{ steps.cfg.outputs.php }}" >> $GITHUB_OUTPUT
          fi

      # ── Check for running task (git pull fast path) ───────────
      - name: Check for running task
        id: task
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster default \
            --family "${{ steps.slug.outputs.task_family }}" \
            --desired-status RUNNING \
            --query 'taskArns[0]' --output text 2>/dev/null || echo "None")

          if [ "$TASK_ARN" != "None" ] && [ -n "$TASK_ARN" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "arn=$TASK_ARN" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ── Fast path: git pull in running container ──────────────
      - name: Update running container (git pull)
        if: steps.task.outputs.exists == 'true'
        run: |
          aws ecs execute-command \
            --cluster default \
            --task "${{ steps.task.outputs.arn }}" \
            --container app \
            --command "/bin/sh -c 'cd /var/www/html && git pull && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache'" \
            --interactive

      # ── Slow path: launch new task ────────────────────────────
      - name: Register task definition
        if: steps.task.outputs.exists == 'false'
        id: taskdef
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --family "${{ steps.slug.outputs.task_family }}" \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 256 \
            --memory 512 \
            --execution-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/ecs-preview-execution" \
            --task-role-arn "arn:aws:iam::${ACCOUNT_ID}:role/ecs-preview-task" \
            --container-definitions "[{
              \"name\": \"app\",
              \"image\": \"${{ steps.resolved.outputs.image }}\",
              \"portMappings\": [{\"containerPort\": 80, \"protocol\": \"tcp\"}],
              \"environment\": [
                {\"name\": \"APP_ENV\", \"value\": \"preview\"},
                {\"name\": \"APP_KEY\", \"value\": \"${{ secrets.PREVIEWS_APP_KEY }}\"},
                {\"name\": \"APP_URL\", \"value\": \"https://${{ steps.slug.outputs.kv_key }}.${{ steps.cfg.outputs.domain }}\"},
                {\"name\": \"REPO_ORG\", \"value\": \"${{ github.repository_owner }}\"},
                {\"name\": \"REPO_NAME\", \"value\": \"${{ github.event.repository.name }}\"},
                {\"name\": \"BRANCH\", \"value\": \"${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}\"},
                {\"name\": \"DEPLOY_KEY\", \"value\": \"$(base64 -w0 docker/preview-deploy-key 2>/dev/null || true)\"}
              ],
              \"logConfiguration\": {
                \"logDriver\": \"awslogs\",
                \"options\": {
                  \"awslogs-group\": \"/ecs/preview\",
                  \"awslogs-region\": \"${{ steps.cfg.outputs.region }}\",
                  \"awslogs-stream-prefix\": \"ecs\",
                  \"awslogs-create-group\": \"true\"
                }
              }
            }]" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Run task
        if: steps.task.outputs.exists == 'false'
        id: run
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster default \
            --launch-type FARGATE \
            --task-definition "${{ steps.taskdef.outputs.arn }}" \
            --network-configuration "awsvpcConfiguration={
              subnets=[subnet-60a76a09,subnet-2c73a757,subnet-62ac422f],
              securityGroups=[sg-0d773f640262948ac],
              assignPublicIp=ENABLED
            }" \
            --enable-execute-command \
            --query 'tasks[0].taskArn' --output text)
          echo "arn=$TASK_ARN" >> $GITHUB_OUTPUT

      # ── Get public IP ─────────────────────────────────────────
      - name: Wait for public IP
        if: steps.task.outputs.exists == 'false'
        id: ip
        run: |
          TASK_ARN="${{ steps.run.outputs.arn }}"
          echo "Waiting for task to get a public IP..."
          for i in $(seq 1 30); do
            ENI=$(aws ecs describe-tasks \
              --cluster default --tasks "$TASK_ARN" \
              --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
              --output text 2>/dev/null)

            if [ -n "$ENI" ] && [ "$ENI" != "None" ]; then
              PUBLIC_IP=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "$ENI" \
                --query 'NetworkInterfaces[0].Association.PublicIp' \
                --output text 2>/dev/null)

              if [ -n "$PUBLIC_IP" ] && [ "$PUBLIC_IP" != "None" ]; then
                echo "Public IP: $PUBLIC_IP"
                echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
                break
              fi
            fi

            echo "  Waiting... (attempt $i/30)"
            sleep 10
          done

          if [ -z "$(grep public_ip $GITHUB_OUTPUT 2>/dev/null | cut -d= -f2)" ]; then
            echo "Timed out waiting for public IP"
            exit 1
          fi

      # ── Wait for app to respond ───────────────────────────────
      - name: Wait for app to respond
        if: steps.task.outputs.exists == 'false'
        run: |
          IP="${{ steps.ip.outputs.public_ip }}"
          echo "Waiting for app to respond at http://$IP/up..."
          for i in $(seq 1 60); do
            if curl -sf --max-time 5 "http://$IP/up" > /dev/null 2>&1; then
              echo "App is responding"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Timed out waiting for app to respond"
              exit 1
            fi
            echo "  Not ready yet (attempt $i/60)"
            sleep 10
          done

      # ── Write to Cloudflare KV ────────────────────────────────
      - name: Register preview in Cloudflare KV
        if: steps.task.outputs.exists == 'false'
        env:
          CF_API_TOKEN: ${{ secrets.PREVIEWS_CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/96100875197cbb8ace4524aaf242af17/storage/kv/namespaces/1bb0fc32aa594b6497860018ef198dbd/values/${{ steps.slug.outputs.kv_key }}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "http://${{ steps.ip.outputs.public_ip }}"

      # ── Post PR comment ───────────────────────────────────────
      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.slug.outputs.kv_key }}';
            const domain = '${{ steps.cfg.outputs.domain }}';
            const url = `https://${slug}.${domain}`;
            const body = [
              '## Preview Environment',
              '',
              `**[${url}](${url})**`,
              '',
              `Branch: \`${process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('## Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.summary.addRaw(body).write();
