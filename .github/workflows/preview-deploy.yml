name: Preview Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC
      pull-requests: write  # PR comments

    steps:
      # ── Context ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "php=$(jq -r .php .claude/project.json)" >> $GITHUB_OUTPUT
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "project_slug=$(jq -r .preview.slug .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$(jq -r .preview.aws.role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "ecr_role_arn=$(jq -r .preview.aws.ecr_role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "instance_role_arn=$(jq -r .preview.aws.instance_role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "db_host=$(jq -r .preview.aws.db_host .claude/project.json)" >> $GITHUB_OUTPUT
          echo "db_username=$(jq -r .preview.aws.db_username .claude/project.json)" >> $GITHUB_OUTPUT
          echo "cf_account_id=$(jq -r .preview.cloudflare.account_id .claude/project.json)" >> $GITHUB_OUTPUT
          echo "cf_kv_namespace_id=$(jq -r .preview.cloudflare.kv_namespace_id .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.aws_role_arn }}
          aws-region: ${{ steps.cfg.outputs.region }}

      - name: Derive names
        id: slug
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGION="${{ steps.cfg.outputs.region }}"
          REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"
          REPO_NAME="preview/${{ github.event.repository.name }}"

          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)

          PROJECT_SLUG="${{ steps.cfg.outputs.project_slug }}"
          KV_KEY="${BRANCH_SLUG}--${PROJECT_SLUG}"

          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "kv_key=$KV_KEY" >> $GITHUB_OUTPUT
          echo "preview_url=https://${KV_KEY}.${{ steps.cfg.outputs.domain }}" >> $GITHUB_OUTPUT
          echo "service=preview-$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "db=preview_$(echo $BRANCH_SLUG | tr '-' '_')" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "repo=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "image=$REGISTRY/$REPO_NAME:$BRANCH_SLUG-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "image_latest=$REGISTRY/$REPO_NAME:$BRANCH_SLUG-latest" >> $GITHUB_OUTPUT

      # ── Build & Push to ECR ──────────────────────────────────
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ steps.slug.outputs.repo }}" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "${{ steps.slug.outputs.repo }}" \
            --image-scanning-configuration scanOnPush=false

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.slug.outputs.image }}
            ${{ steps.slug.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PHP_VERSION=${{ steps.cfg.outputs.php }}

      # ── Database ─────────────────────────────────────────────
      - name: Create preview database
        run: |
          mysql -h "${{ steps.cfg.outputs.db_host }}" \
            -u "${{ steps.cfg.outputs.db_username }}" \
            -p"${{ secrets.DB_PASSWORD }}" \
            -e "CREATE DATABASE IF NOT EXISTS \`${{ steps.slug.outputs.db }}\`"

      # ── App Runner ───────────────────────────────────────────
      - name: Check if service exists
        id: svc
        run: |
          ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ steps.slug.outputs.service }}'].ServiceArn" \
            --output text 2>/dev/null || true)
          echo "arn=$ARN" >> $GITHUB_OUTPUT
          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create App Runner service
        if: steps.svc.outputs.exists == 'false'
        id: create
        run: |
          ARN=$(aws apprunner create-service \
            --service-name "${{ steps.slug.outputs.service }}" \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ steps.cfg.outputs.ecr_role_arn }}\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ steps.slug.outputs.image }}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"80\",
                  \"RuntimeEnvironmentVariables\": {
                    \"APP_ENV\": \"preview\",
                    \"APP_KEY\": \"${{ secrets.APP_KEY }}\",
                    \"APP_URL\": \"${{ steps.slug.outputs.preview_url }}\",
                    \"DB_HOST\": \"${{ steps.cfg.outputs.db_host }}\",
                    \"DB_PORT\": \"3306\",
                    \"DB_DATABASE\": \"${{ steps.slug.outputs.db }}\",
                    \"DB_USERNAME\": \"${{ steps.cfg.outputs.db_username }}\",
                    \"DB_PASSWORD\": \"${{ secrets.DB_PASSWORD }}\"
                  }
                }
              }
            }" \
            --instance-configuration "{
              \"Cpu\": \"0.25 vCPU\",
              \"Memory\": \"1 GB\",
              \"InstanceRoleArn\": \"${{ steps.cfg.outputs.instance_role_arn }}\"
            }" \
            --health-check-configuration '{
              "Protocol": "HTTP",
              "Path": "/up",
              "Interval": 10,
              "Timeout": 5,
              "HealthyThreshold": 1,
              "UnhealthyThreshold": 3
            }' \
            --query 'Service.ServiceArn' \
            --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Update existing App Runner service
        if: steps.svc.outputs.exists == 'true'
        run: |
          aws apprunner update-service \
            --service-arn "${{ steps.svc.outputs.arn }}" \
            --source-configuration "{
              \"AuthenticationConfiguration\": {
                \"AccessRoleArn\": \"${{ steps.cfg.outputs.ecr_role_arn }}\"
              },
              \"AutoDeploymentsEnabled\": false,
              \"ImageRepository\": {
                \"ImageIdentifier\": \"${{ steps.slug.outputs.image }}\",
                \"ImageRepositoryType\": \"ECR\",
                \"ImageConfiguration\": {
                  \"Port\": \"80\",
                  \"RuntimeEnvironmentVariables\": {
                    \"APP_ENV\": \"preview\",
                    \"APP_KEY\": \"${{ secrets.APP_KEY }}\",
                    \"APP_URL\": \"${{ steps.slug.outputs.preview_url }}\",
                    \"DB_HOST\": \"${{ steps.cfg.outputs.db_host }}\",
                    \"DB_PORT\": \"3306\",
                    \"DB_DATABASE\": \"${{ steps.slug.outputs.db }}\",
                    \"DB_USERNAME\": \"${{ steps.cfg.outputs.db_username }}\",
                    \"DB_PASSWORD\": \"${{ secrets.DB_PASSWORD }}\"
                  }
                }
              }
            }"

      - name: Wait for service to be running
        id: wait
        run: |
          SERVICE_ARN="${{ steps.create.outputs.arn || steps.svc.outputs.arn }}"
          echo "Waiting for $SERVICE_ARN to be RUNNING..."
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query 'Service.Status' \
              --output text)
            echo "  Status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "RUNNING" ]; then
              RUNNER_URL=$(aws apprunner describe-service \
                --service-arn "$SERVICE_ARN" \
                --query 'Service.ServiceUrl' \
                --output text)
              echo "runner_url=$RUNNER_URL" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ]; then
              echo "Service failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      # ── Cloudflare KV ─────────────────────────────────────────
      - name: Register preview in Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ steps.cfg.outputs.cf_account_id }}/storage/kv/namespaces/${{ steps.cfg.outputs.cf_kv_namespace_id }}/values/${{ steps.slug.outputs.kv_key }}" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            --data "https://${{ steps.wait.outputs.runner_url }}"

      # ── Summary ──────────────────────────────────────────────
      - name: Post preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.slug.outputs.preview_url }}';
            const body = [
              '## Preview Environment',
              '',
              `**[${url}](${url})**`,
              '',
              `Branch: \`${process.env.GITHUB_HEAD_REF || process.env.GITHUB_REF_NAME}\``,
              `Database: \`${{ steps.slug.outputs.db }}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('## Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            core.summary.addRaw(body).write();
