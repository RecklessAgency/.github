name: Preview Teardown

on:
  workflow_call:

jobs:
  teardown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "project_slug=$(jq -r .preview.slug .claude/project.json)" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$(jq -r .preview.aws.role_arn .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Derive branch slug
        id: slug
        run: |
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "kv_key=${BRANCH_SLUG}--${{ steps.cfg.outputs.project_slug }}" >> $GITHUB_OUTPUT
          echo "task_family=preview-${BRANCH_SLUG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.aws_role_arn }}
          aws-region: ${{ steps.cfg.outputs.region }}

      # ── Stop running tasks ────────────────────────────────────
      - name: Stop preview tasks
        run: |
          TASKS=$(aws ecs list-tasks \
            --cluster default \
            --family "${{ steps.slug.outputs.task_family }}" \
            --query 'taskArns' --output json 2>/dev/null || echo "[]")

          if [ "$TASKS" != "[]" ] && [ -n "$TASKS" ]; then
            echo "$TASKS" | jq -r '.[]' | while read -r TASK_ARN; do
              echo "Stopping task: $TASK_ARN"
              aws ecs stop-task --cluster default --task "$TASK_ARN" --reason "Preview teardown" > /dev/null
            done
          else
            echo "No running tasks found for ${{ steps.slug.outputs.task_family }} — skipping"
          fi

      # ── Deregister task definitions ───────────────────────────
      - name: Deregister task definitions
        run: |
          TASK_DEFS=$(aws ecs list-task-definitions \
            --family-prefix "${{ steps.slug.outputs.task_family }}" \
            --query 'taskDefinitionArns' --output json 2>/dev/null || echo "[]")

          if [ "$TASK_DEFS" != "[]" ] && [ -n "$TASK_DEFS" ]; then
            echo "$TASK_DEFS" | jq -r '.[]' | while read -r ARN; do
              aws ecs deregister-task-definition --task-definition "$ARN" > /dev/null
              echo "Deregistered: $ARN"
            done
          fi

      # ── Remove Cloudflare KV entry ────────────────────────────
      - name: Remove preview from Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.PREVIEWS_CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/96100875197cbb8ace4524aaf242af17/storage/kv/namespaces/1bb0fc32aa594b6497860018ef198dbd/values/${{ steps.slug.outputs.kv_key }}" \
            -H "Authorization: Bearer $CF_API_TOKEN"

      - name: Summary
        run: |
          echo "## Teardown Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tasks stopped for family: \`${{ steps.slug.outputs.task_family }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL removed from KV: \`${{ steps.slug.outputs.kv_key }}\`" >> $GITHUB_STEP_SUMMARY
