name: Preview Teardown

on:
  workflow_call:

jobs:
  teardown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "domain=$(jq -r .preview.domain .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Derive branch slug
        id: slug
        run: |
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "service=preview-$SLUG" >> $GITHUB_OUTPUT
          echo "db=preview_$(echo $SLUG | tr '-' '_')" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ steps.cfg.outputs.region }}

      # ── Delete App Runner service ────────────────────────────
      - name: Find and delete App Runner service
        run: |
          ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ steps.slug.outputs.service }}'].ServiceArn" \
            --output text 2>/dev/null || true)

          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "Deleting service: ${{ steps.slug.outputs.service }} ($ARN)"
            aws apprunner delete-service --service-arn "$ARN"
            echo "Service deletion initiated"
          else
            echo "No service found for ${{ steps.slug.outputs.service }} — skipping"
          fi

      # ── Drop database ────────────────────────────────────────
      - name: Drop preview database
        run: |
          echo "Dropping database: ${{ steps.slug.outputs.db }}"
          mysql -h "${{ secrets.DB_HOST }}" \
            -u "${{ secrets.DB_USERNAME }}" \
            -p"${{ secrets.DB_PASSWORD }}" \
            -e "DROP DATABASE IF EXISTS \`${{ steps.slug.outputs.db }}\`"

      # ── Remove DNS record ────────────────────────────────────
      - name: Remove Cloudflare DNS record
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          SUBDOMAIN="${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}"

          RECORD_ID=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records?name=$SUBDOMAIN&type=CNAME" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            echo "Removing DNS record for $SUBDOMAIN"
            curl -s -X DELETE \
              "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json"
          else
            echo "No DNS record found for $SUBDOMAIN — skipping"
          fi

      # ── Clean up ECR images ──────────────────────────────────
      - name: Clean up ECR images
        run: |
          REPO="preview/${{ github.event.repository.name }}"
          SLUG="${{ steps.slug.outputs.slug }}"

          # List images tagged with this branch slug
          IMAGES=$(aws ecr list-images \
            --repository-name "$REPO" \
            --query "imageIds[?starts_with(imageTag, '${SLUG}-')]" \
            --output json 2>/dev/null || echo "[]")

          if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
            echo "Deleting images for slug $SLUG from $REPO"
            aws ecr batch-delete-image \
              --repository-name "$REPO" \
              --image-ids "$IMAGES" || true
          else
            echo "No images found for slug $SLUG — skipping"
          fi

      - name: Summary
        run: |
          echo "## Teardown Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`${{ steps.slug.outputs.service }}\` — deleted" >> $GITHUB_STEP_SUMMARY
          echo "- Database: \`${{ steps.slug.outputs.db }}\` — dropped" >> $GITHUB_STEP_SUMMARY
          echo "- DNS: \`${{ steps.slug.outputs.slug }}.${{ steps.cfg.outputs.domain }}\` — removed" >> $GITHUB_STEP_SUMMARY
          echo "- Images: cleaned up" >> $GITHUB_STEP_SUMMARY
