name: Preview Teardown

on:
  workflow_call:

jobs:
  teardown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read project config
        id: cfg
        run: |
          echo "region=$(jq -r .preview.region .claude/project.json)" >> $GITHUB_OUTPUT
          echo "project_slug=$(jq -r .preview.slug .claude/project.json)" >> $GITHUB_OUTPUT
          echo "aws_role_arn=$(jq -r .preview.aws.role_arn .claude/project.json)" >> $GITHUB_OUTPUT
          echo "db_host=$(jq -r .preview.aws.db_host .claude/project.json)" >> $GITHUB_OUTPUT
          echo "db_username=$(jq -r .preview.aws.db_username .claude/project.json)" >> $GITHUB_OUTPUT
          echo "cf_account_id=$(jq -r .preview.cloudflare.account_id .claude/project.json)" >> $GITHUB_OUTPUT
          echo "cf_kv_namespace_id=$(jq -r .preview.cloudflare.kv_namespace_id .claude/project.json)" >> $GITHUB_OUTPUT

      - name: Derive branch slug
        id: slug
        run: |
          REF="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BRANCH_SLUG=$(echo "$REF" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//' \
            | cut -c1-50)
          echo "branch_slug=$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "kv_key=${BRANCH_SLUG}--${{ steps.cfg.outputs.project_slug }}" >> $GITHUB_OUTPUT
          echo "service=preview-$BRANCH_SLUG" >> $GITHUB_OUTPUT
          echo "db=preview_$(echo $BRANCH_SLUG | tr '-' '_')" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cfg.outputs.aws_role_arn }}
          aws-region: ${{ steps.cfg.outputs.region }}

      # ── Delete App Runner service ────────────────────────────
      - name: Find and delete App Runner service
        run: |
          ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='${{ steps.slug.outputs.service }}'].ServiceArn" \
            --output text 2>/dev/null || true)

          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            echo "Deleting service: ${{ steps.slug.outputs.service }} ($ARN)"
            aws apprunner delete-service --service-arn "$ARN"
            echo "Service deletion initiated"
          else
            echo "No service found for ${{ steps.slug.outputs.service }} — skipping"
          fi

      # ── Drop database ────────────────────────────────────────
      - name: Drop preview database
        run: |
          echo "Dropping database: ${{ steps.slug.outputs.db }}"
          mysql -h "${{ steps.cfg.outputs.db_host }}" \
            -u "${{ steps.cfg.outputs.db_username }}" \
            -p"${{ secrets.DB_PASSWORD }}" \
            -e "DROP DATABASE IF EXISTS \`${{ steps.slug.outputs.db }}\`"

      # ── Remove Cloudflare KV entry ───────────────────────────
      - name: Remove preview from Cloudflare KV
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          curl -s -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${{ steps.cfg.outputs.cf_account_id }}/storage/kv/namespaces/${{ steps.cfg.outputs.cf_kv_namespace_id }}/values/${{ steps.slug.outputs.kv_key }}" \
            -H "Authorization: Bearer $CF_API_TOKEN"

      # ── Clean up ECR images ──────────────────────────────────
      - name: Clean up ECR images
        run: |
          REPO="preview/${{ github.event.repository.name }}"
          SLUG="${{ steps.slug.outputs.branch_slug }}"

          IMAGES=$(aws ecr list-images \
            --repository-name "$REPO" \
            --query "imageIds[?starts_with(imageTag, '${SLUG}-')]" \
            --output json 2>/dev/null || echo "[]")

          if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
            echo "Deleting images for slug $SLUG from $REPO"
            aws ecr batch-delete-image \
              --repository-name "$REPO" \
              --image-ids "$IMAGES" || true
          else
            echo "No images found for slug $SLUG — skipping"
          fi

      - name: Summary
        run: |
          echo "## Teardown Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Service: \`${{ steps.slug.outputs.service }}\` — deleted" >> $GITHUB_STEP_SUMMARY
          echo "- Database: \`${{ steps.slug.outputs.db }}\` — dropped" >> $GITHUB_STEP_SUMMARY
          echo "- Preview URL: removed from KV (\`${{ steps.slug.outputs.kv_key }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "- Images: cleaned up" >> $GITHUB_STEP_SUMMARY
